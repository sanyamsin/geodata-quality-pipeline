version: "3.8"

services:
  postgis:
    image: postgis/postgis:15-3.3
    container_name: geodata_postgis
    environment:
      POSTGRES_DB: geodata_pipeline
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pipeline_pass
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline_user -d geodata_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: geodata_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@geodata.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgis:
        condition: service_healthy

volumes:
  postgis_data:
